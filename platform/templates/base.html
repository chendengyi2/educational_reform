<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="bi bi-bar-chart-line-fill"></i> {{ app_name }}
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> 数据大屏</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/algorithm/"><i class="bi bi-cpu"></i> 算法管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/case/"><i class="bi bi-journal-code"></i> 案例演示</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/visualization"><i class="bi bi-graph-up"></i> 结果可视化</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    {% if username %}
                    <span class="text-light me-3">
                        <i class="bi bi-person-circle"></i> {{ username }}
                        <span class="badge bg-info ms-1">{{ user_role }}</span>
                    </span>
                    <a href="/auth/logout" class="btn btn-outline-light btn-sm">退出</a>
                    {% else %}
                    <a href="/auth/login" class="btn btn-outline-light btn-sm">登录</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- 侧边栏 + 主内容 -->
    <div class="container-fluid" style="margin-top: 56px;">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-2 d-none d-md-block bg-dark sidebar">
                <div class="sidebar-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link sidebar-link" href="/dashboard">
                                <i class="bi bi-speedometer2"></i> 数据概览
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link sidebar-link" href="/algorithm/">
                                <i class="bi bi-cpu"></i> 算法管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link sidebar-link" href="/case/">
                                <i class="bi bi-journal-code"></i> 案例演示
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link sidebar-link" href="/visualization">
                                <i class="bi bi-graph-up"></i> 结果可视化
                            </a>
                        </li>
                        <li class="nav-item mt-3">
                            <small class="text-muted ps-3">系统管理</small>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link sidebar-link" href="/auth/login">
                                <i class="bi bi-person-badge"></i> 用户管理
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 主内容区域 -->
            <main class="col-md-10 ms-sm-auto px-4 py-3">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
