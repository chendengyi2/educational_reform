{% extends "base.html" %}
{% block title %}算法模型管理 - {{ app_name }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="bi bi-cpu"></i> 算法模型管理</h4>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
        <i class="bi bi-plus-circle"></i> 新建模型
    </button>
</div>

<!-- 分类筛选 -->
<div class="row mb-3">
    <div class="col-md-3">
        <select class="form-select" id="filter-category">
            <option value="">全部分类</option>
            <option value="classification">分类算法</option>
            <option value="clustering">聚类算法</option>
            <option value="regression">回归算法</option>
            <option value="recommendation">推荐算法</option>
            <option value="timeseries">时序分析</option>
            <option value="reinforcement">强化学习</option>
        </select>
    </div>
    <div class="col-md-3">
        <select class="form-select" id="filter-status">
            <option value="">全部状态</option>
            <option value="draft">草稿</option>
            <option value="training">训练中</option>
            <option value="trained">已训练</option>
            <option value="deployed">已部署</option>
        </select>
    </div>
    <div class="col-md-4">
        <input type="text" class="form-control" id="filter-keyword" placeholder="搜索模型名称...">
    </div>
    <div class="col-md-2">
        <button class="btn btn-outline-primary w-100" id="btn-search"><i class="bi bi-search"></i> 搜索</button>
    </div>
</div>

<!-- 模型列表 -->
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>模型名称</th>
                    <th>分类</th>
                    <th>版本</th>
                    <th>准确率</th>
                    <th>F1分数</th>
                    <th>状态</th>
                    <th>更新时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="model-list"></tbody>
        </table>
    </div>
</div>

<!-- 新建模型弹窗 -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新建算法模型</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">模型名称</label>
                    <input type="text" class="form-control" id="input-name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">分类</label>
                    <select class="form-select" id="input-category">
                        <option value="classification">分类算法</option>
                        <option value="clustering">聚类算法</option>
                        <option value="regression">回归算法</option>
                        <option value="recommendation">推荐算法</option>
                        <option value="timeseries">时序分析</option>
                        <option value="reinforcement">强化学习</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">描述</label>
                    <textarea class="form-control" id="input-description" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">版本</label>
                    <input type="text" class="form-control" id="input-version" value="1.0">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btn-create">创建</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var categoryMap = {
    'classification': '分类算法', 'clustering': '聚类算法', 'regression': '回归算法',
    'recommendation': '推荐算法', 'timeseries': '时序分析', 'reinforcement': '强化学习'
};
var statusMap = {
    'draft': '<span class="badge bg-secondary">草稿</span>',
    'training': '<span class="badge bg-warning text-dark">训练中</span>',
    'trained': '<span class="badge bg-info">已训练</span>',
    'deployed': '<span class="badge bg-success">已部署</span>'
};

function loadModels() {
    var category = $('#filter-category').val();
    var status = $('#filter-status').val();
    var keyword = $('#filter-keyword').val();
    $.getJSON('/algorithm/api/list', {category: category, status: status, keyword: keyword}, function(res) {
        var html = '';
        res.data.forEach(function(m) {
            html += '<tr>' +
                '<td>' + m.id + '</td>' +
                '<td><strong>' + m.name + '</strong></td>' +
                '<td>' + (categoryMap[m.category] || m.category) + '</td>' +
                '<td>' + m.version + '</td>' +
                '<td>' + (m.accuracy ? (m.accuracy * 100).toFixed(1) + '%' : '-') + '</td>' +
                '<td>' + (m.f1_score ? (m.f1_score * 100).toFixed(1) + '%' : '-') + '</td>' +
                '<td>' + (statusMap[m.status] || m.status) + '</td>' +
                '<td>' + m.updated_at + '</td>' +
                '<td>' +
                    (m.status === 'draft' || m.status === 'trained' ?
                        '<button class="btn btn-sm btn-outline-primary btn-train" data-id="' + m.id + '">训练</button> ' : '') +
                    (m.status === 'trained' ?
                        '<button class="btn btn-sm btn-outline-success btn-deploy" data-id="' + m.id + '">部署</button> ' : '') +
                '</td>' +
                '</tr>';
        });
        $('#model-list').html(html || '<tr><td colspan="9" class="text-center text-muted">暂无数据</td></tr>');
    });
}

$(function() {
    loadModels();
    $('#btn-search').click(loadModels);
    $('#filter-category, #filter-status').change(loadModels);
    $('#filter-keyword').keypress(function(e) { if(e.which === 13) loadModels(); });

    // 创建模型
    $('#btn-create').click(function() {
        $.ajax({
            url: '/algorithm/api/create',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                name: $('#input-name').val(),
                category: $('#input-category').val(),
                description: $('#input-description').val(),
                version: $('#input-version').val()
            }),
            success: function(res) {
                if (res.code === 0) {
                    bootstrap.Modal.getInstance($('#createModal')).hide();
                    loadModels();
                }
            }
        });
    });

    // 训练 / 部署
    $(document).on('click', '.btn-train', function() {
        var id = $(this).data('id');
        $.post('/algorithm/api/train/' + id, function(res) {
            if (res.code === 0) { alert('训练完成'); loadModels(); }
        });
    });
    $(document).on('click', '.btn-deploy', function() {
        var id = $(this).data('id');
        $.post('/algorithm/api/deploy/' + id, function(res) {
            if (res.code === 0) { alert('部署成功'); loadModels(); }
        });
    });
});
</script>
{% endblock %}
