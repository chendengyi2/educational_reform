{% extends "base.html" %}
{% block title %}登录 - {{ app_name }}{% endblock %}

{% block extra_css %}
<style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
    .login-card {
        background: rgba(255,255,255,0.95);
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .login-header h3 { color: #1a1a2e; font-weight: 700; }
    .login-header p { color: #666; }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 80px;">
    <div class="col-md-5 col-sm-8">
        <div class="login-card">
            <div class="login-header">
                <i class="bi bi-bar-chart-line-fill" style="font-size: 3rem; color: #3a7bd5;"></i>
                <h3 class="mt-3">{{ app_name }}</h3>
                <p>请登录您的账户</p>
            </div>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="input-username" placeholder="请输入用户名" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="input-password" placeholder="请输入密码" required>
                    </div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me">
                    <label class="form-check-label" for="remember-me">记住我</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right"></i> 登录
                </button>
                <div class="text-center mt-3">
                    <small class="text-muted">测试账号：admin / admin123</small>
                </div>
                <div id="login-error" class="alert alert-danger mt-3" style="display:none;"></div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$('#login-form').submit(function(e) {
    e.preventDefault();
    var username = $('#input-username').val();
    var password = $('#input-password').val();

    $.ajax({
        url: '/auth/login',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({username: username, password: password}),
        success: function(res) {
            if (res.code === 0) {
                window.location.href = '/dashboard';
            }
        },
        error: function(xhr) {
            var msg = '登录失败，请检查用户名和密码';
            if (xhr.responseJSON && xhr.responseJSON.msg) {
                msg = xhr.responseJSON.msg;
            }
            $('#login-error').text(msg).show();
        }
    });
});
</script>
{% endblock %}
