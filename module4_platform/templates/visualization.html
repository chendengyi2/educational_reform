{% extends "base.html" %}
{% block title %}结果可视化 - {{ app_name }}{% endblock %}

{% block extra_css %}
<style>
    .viz-card {
        background: #1a1a2e;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 20px;
        border: 1px solid rgba(255,255,255,0.05);
    }
    .viz-title {
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 10px;
        padding-left: 10px;
        border-left: 3px solid #3a7bd5;
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="bi bi-graph-up"></i> 结果可视化</h4>
    <div>
        <button class="btn btn-outline-primary btn-sm" id="btn-refresh"><i class="bi bi-arrow-clockwise"></i> 刷新数据</button>
    </div>
</div>

<!-- 分析结果卡片 -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h3 id="viz-result-count">--</h3>
                <small class="text-muted">分析结果总数</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h3 id="viz-chart-types">4</h3>
                <small class="text-muted">图表类型</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h3 id="viz-algorithms">6</h3>
                <small class="text-muted">关联算法</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center">
            <div class="card-body">
                <h3 id="viz-updated">--</h3>
                <small class="text-muted">最近更新</small>
            </div>
        </div>
    </div>
</div>

<!-- 图表区域 -->
<div class="row">
    <div class="col-md-6">
        <div class="viz-card">
            <div class="viz-title">资产相关性热力图</div>
            <div id="chart-heatmap" style="height: 400px;"></div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="viz-card">
            <div class="viz-title">指数走势对比</div>
            <div id="chart-timeseries" style="height: 400px;"></div>
        </div>
    </div>
</div>

<!-- 分析结果列表 -->
<div class="row mt-3">
    <div class="col-12">
        <div class="card">
            <div class="card-header"><strong>历史分析结果</strong></div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>标题</th>
                            <th>图表类型</th>
                            <th>摘要</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="result-list"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var chartTypeMap = {
    'bar': '柱状图', 'line': '折线图', 'pie': '饼图',
    'scatter': '散点图', 'heatmap': '热力图', 'radar': '雷达图'
};

function loadVisualization() {
    $.getJSON('/api/visualization/data', function(data) {
        // 热力图
        var heatmapChart = echarts.init(document.getElementById('chart-heatmap'));
        heatmapChart.setOption({
            tooltip: { position: 'top' },
            grid: { top: '10%', bottom: '15%', left: '15%', right: '10%' },
            xAxis: { type: 'category', data: data.heatmap.assets, axisLabel: {color: '#aaa'} },
            yAxis: { type: 'category', data: data.heatmap.assets, axisLabel: {color: '#aaa'} },
            visualMap: { min: -0.5, max: 1, calculable: true, orient: 'horizontal',
                left: 'center', bottom: '0%', inRange: { color: ['#313695', '#4575b4', '#74add1', '#abd9e9',
                '#e0f3f8', '#ffffbf', '#fee090', '#fdae61', '#f46d43', '#d73027', '#a50026'] },
                textStyle: {color: '#aaa'}
            },
            series: [{
                type: 'heatmap', data: data.heatmap.data,
                label: { show: true, color: '#fff' },
                emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } }
            }]
        });

        // 时序图
        var tsChart = echarts.init(document.getElementById('chart-timeseries'));
        var tsSeries = [];
        Object.entries(data.time_series.series).forEach(function(entry) {
            tsSeries.push({ name: entry[0], type: 'line', data: entry[1], smooth: true });
        });
        tsChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: Object.keys(data.time_series.series), textStyle: {color: '#ccc'} },
            xAxis: { type: 'category', data: data.time_series.dates, axisLabel: {color: '#aaa', rotate: 30} },
            yAxis: { type: 'value', axisLabel: {color: '#aaa'} },
            series: tsSeries
        });

        window.addEventListener('resize', function() {
            heatmapChart.resize();
            tsChart.resize();
        });
    });

    // 加载结果列表
    $.getJSON('/api/overview', function(res) {
        $('#viz-result-count').text(res.stats.result_count);
    });

    // 模拟结果列表
    var defaultResults = [
        {id: 1, title: '信贷风控模型准确率对比', chart_type: 'bar', summary: 'XGBoost以93%准确率领先', created_at: '2025-06-10'},
        {id: 2, title: '客户价值聚类分析', chart_type: 'scatter', summary: '将客户分为3类', created_at: '2025-06-11'},
        {id: 3, title: '股价走势预测', chart_type: 'line', summary: 'LSTM模型平均误差3.2%', created_at: '2025-06-12'},
        {id: 4, title: '金融产品推荐占比', chart_type: 'pie', summary: '基金理财占比最高', created_at: '2025-06-13'}
    ];
    var html = '';
    defaultResults.forEach(function(r) {
        html += '<tr><td>' + r.id + '</td><td>' + r.title + '</td>' +
            '<td><span class="badge bg-info">' + (chartTypeMap[r.chart_type] || r.chart_type) + '</span></td>' +
            '<td class="text-muted">' + r.summary + '</td>' +
            '<td>' + r.created_at + '</td></tr>';
    });
    $('#result-list').html(html);
    $('#viz-updated').text('今日');
}

$(function() {
    loadVisualization();
    $('#btn-refresh').click(function() {
        loadVisualization();
    });
});
</script>
{% endblock %}
